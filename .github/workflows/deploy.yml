name: Deploy Worker

on:
  workflow_run:
    workflows: ["Docker Publish"] # Trigger after Docker Publish workflow completes
    branches: [ "main" ]
    types:
      - completed

jobs:
  deploy:
    name: Deploy Worker to Server
    runs-on: self-hosted
    # Only run if the Docker Publish workflow was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # IMPORTANT: If your secrets are stored in a GitHub Environment (e.g., 'production'),
    # you must uncomment the following line and provide the matching environment name:
    environment: production

    permissions:
      contents: read
      packages: read

    steps:
      - name: Get commit SHA and repository name from workflow_run
        run: |
          echo "GITHUB_SHA_FROM_RUN=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Checkout repository (to get deploy.sh)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Execute deploy script locally
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CDP_URL: ${{ secrets.CDP_URL }}
          GITHUB_REPOSITORY: ${{ env.REPO_LOWER }}
          GITHUB_SHA: ${{ env.GITHUB_SHA_FROM_RUN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          # 直接在伺服器本地端賦予權限並執行
          # Provide necessary environment variables to the deploy script
          chmod +x ./deploy.sh
          ./deploy.sh